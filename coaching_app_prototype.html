<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperGrads — Institute Manager</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#004677">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SuperGrads">
<style>
  :root{
    --ink:#004677; --ink2:#1A6EA8; --bg:#F7F8FA; --card:#FFFFFF;
    --marigold:#FF6047; --green:#2E8B57; --red:#D9534F; --amber:#E8940A;
    --txt:#333333; --mut:#7A8699; --line:#E4E8EE;
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  body{background:var(--bg);color:var(--txt)}
  .app{display:flex;min-height:100vh}

  /* Sidebar */
  .side{width:220px;background:var(--ink);color:#fff;padding:20px 0;flex-shrink:0;display:flex;flex-direction:column}
  .logobar{background:#fff;margin:0 14px 16px;padding:10px 12px;border-radius:10px;text-align:center}
  .logobar img{max-width:100%;height:auto;display:block}
  .nav{flex:1}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;color:#B9C3DA;
    padding:12px 20px;font-size:14px;cursor:pointer;text-align:left;border-left:3px solid transparent}
  .nav button.on{color:#fff;background:rgba(255,255,255,.07);border-left-color:var(--marigold);font-weight:600}
  .nav button:hover{color:#fff}
  .inst{padding:14px 20px;font-size:12px;color:#8FA0C4;border-top:1px solid rgba(255,255,255,.12)}

  /* Main */
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .top{background:var(--card);border-bottom:1px solid var(--line);padding:14px 26px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .top h1{font-size:18px;color:var(--ink)}
  .role{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:3px}
  .role button{border:none;background:none;padding:7px 18px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;color:var(--mut)}
  .role button.on{background:var(--ink);color:#fff}
  .content{padding:24px 26px;overflow:auto}

  /* Cards & grids */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
  .kpi .v{font-size:26px;font-weight:800;color:var(--ink)}
  .kpi .l{font-size:12px;color:var(--mut);margin-top:3px}
  .kpi .d{font-size:11px;margin-top:6px;font-weight:600}
  .up{color:var(--green)} .down{color:var(--red)} .warn{color:var(--amber)}
  .grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
  @media(max-width:900px){.grid2{grid-template-columns:1fr}.side{width:64px}.logobar,.nav .t,.inst{display:none}.nav button{justify-content:center;padding:14px 0}}
  @media(max-width:560px){
    .app{flex-direction:column}
    /* sidebar -> bottom tab bar */
    .side{width:100%;height:auto;position:fixed;bottom:0;left:0;z-index:50;
      flex-direction:row;padding:0;order:2;box-shadow:0 -2px 12px rgba(0,0,0,.15)}
    .logobar,.inst{display:none}
    .nav{display:flex;width:100%;justify-content:space-around}
    .nav button{flex-direction:column;gap:3px;font-size:20px;padding:9px 2px;border-left:none;border-top:3px solid transparent;flex:1;text-align:center;line-height:1}
    .nav button.on{border-left:none;border-top-color:var(--marigold);background:rgba(255,255,255,.10)}
    .nav .t{display:block !important;font-size:9.5px;line-height:1;font-weight:600}
    .main{order:1;padding-bottom:72px}
    .top{position:sticky;top:0;z-index:40;padding:12px 14px}
    .top h1{font-size:16px}
    .role{padding:2px}.role button{padding:6px 14px;font-size:12px}
    .content{padding:12px}
    /* flatter cards, less shadow, tighter */
    .kpis{grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
    .kpi{padding:11px;border-radius:10px}.kpi .v{font-size:19px}.kpi .l{font-size:10.5px;line-height:1.2}.kpi .d{font-size:9.5px;margin-top:3px}
    .card{padding:12px;margin-bottom:11px;border-radius:10px}
    .card h3{font-size:13px;margin-bottom:8px}
    .grid2{gap:11px}
    .cal .day{min-height:46px;padding:2px}.cal .h{font-size:8.5px;padding:2px 0}
    .ev{font-size:7.5px;padding:1px 2px;margin-top:2px}.cal .day .n{font-size:9.5px}
    table{font-size:11.5px}th{font-size:9px;padding:6px 4px}td{padding:7px 4px}
    .tabs{gap:5px;margin-bottom:11px}.tabs button{padding:6px 11px;font-size:11.5px}
    .alert-row{padding:7px 0;font-size:11.5px;gap:8px}
    .bar{min-width:50px}
    .att-btn{padding:5px 10px;font-size:11px}
    .toast{bottom:auto !important;top:60px !important;right:auto !important;left:50% !important;
      transform:translateX(-50%) translateY(-8px);max-width:88% !important;width:max-content;
      text-align:center;font-size:12px;padding:9px 14px !important}
    .toast.show{transform:translateX(-50%) translateY(0) !important}
  }
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:16px}
  .card h3{font-size:14px;color:var(--ink);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
  .chip{font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px}
  .chip.g{background:#E7F4EC;color:var(--green)} .chip.r{background:#FBEAEA;color:var(--red)} .chip.a{background:#FDF3E0;color:var(--amber)}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px;text-align:left;padding:8px 6px;border-bottom:1px solid var(--line)}
  td{padding:10px 6px;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  .bar{height:6px;background:var(--line);border-radius:99px;overflow:hidden;min-width:70px}
  .bar i{display:block;height:100%;border-radius:99px}

  .att-btn{border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;color:var(--mut)}
  .att-btn.p{border-color:var(--green);background:#E7F4EC;color:var(--green)}
  .att-btn.ab{border-color:var(--red);background:#FBEAEA;color:var(--red)}
  .toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;
    box-shadow:0 8px 24px rgba(27,42,74,.35);opacity:0;transform:translateY(10px);transition:.25s;pointer-events:none;max-width:320px}
  .toast.show{opacity:1;transform:none}
  .alert-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px}
  .alert-row:last-child{border-bottom:none}
  .dot{width:8px;height:8px;border-radius:99px;margin-top:5px;flex-shrink:0}
  .primary{background:var(--marigold);border:none;color:var(--ink);font-weight:700;font-size:13px;padding:9px 16px;border-radius:8px;cursor:pointer}
  .heat{display:flex;gap:3px;flex-wrap:wrap}
  .heat b{width:14px;height:14px;border-radius:3px;display:block}
  .pill{font-size:12px;color:var(--mut)}
  .hide{display:none}
  select,input[type=text]{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--txt);background:#fff}
  .tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .tabs button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 16px;font-size:13px;font-weight:600;color:var(--mut);cursor:pointer}
  .tabs button.on{background:var(--ink);border-color:var(--ink);color:#fff}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal .h{font-size:11px;color:var(--mut);text-align:center;padding:4px 0;text-transform:uppercase}
  .cal .day{border:1px solid var(--line);border-radius:8px;min-height:64px;padding:5px;font-size:11px;background:#fff}
  .cal .day .n{font-weight:700;color:var(--ink);font-size:12px}
  .cal .day.today{border-color:var(--marigold);background:#FFF8EA}
  .cal .day.blank{border:none;background:none}
  .ev{display:block;margin-top:3px;padding:2px 5px;border-radius:5px;font-size:10px;font-weight:600;line-height:1.25}
  .ev.mock{background:#FDF3E0;color:var(--amber)} .ev.exam{background:#FBEAEA;color:var(--red)}
  .ev.ptm{background:#E9EDF7;color:var(--ink2)} .ev.fee{background:#FBEAEA;color:var(--red)} .ev.hol{background:#E7F4EC;color:var(--green)}
</style>
</head>

/* ---------- PWA: install prompt + offline ---------- */
let deferredPrompt=null;
const installBtn=document.createElement("button");
installBtn.textContent="⤓ Install app";
installBtn.style.cssText="position:fixed;bottom:20px;left:20px;background:var(--marigold);color:#fff;border:none;padding:11px 18px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(255,96,71,.4);display:none;z-index:99";
document.body.appendChild(installBtn);
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;installBtn.style.display="block";});
installBtn.onclick=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;installBtn.style.display="none";};
window.addEventListener("appinstalled",()=>{installBtn.style.display="none";toast("SuperGrads app install ho gaya ✓ — home screen pe icon dekho");});

if("serviceWorker" in navigator){
  const swCode=`
    const C="supergrads-v1";
    self.addEventListener("install",e=>{self.skipWaiting()});
    self.addEventListener("activate",e=>{self.clients.claim()});
    self.addEventListener("fetch",e=>{
      e.respondWith(caches.open(C).then(async cache=>{
        const hit=await cache.match(e.request);
        if(hit)return hit;
        try{const res=await fetch(e.request);cache.put(e.request,res.clone());return res;}
        catch(_){return hit||Response.error();}
      }));
    });`;
  const blob=new Blob([swCode],{type:"text/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
